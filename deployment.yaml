apiVersion: apps/v1

kind: Deployment

metadata:
  name: covid-dashboard-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: covid-dashboard

  template:

    metadata:
      labels:
        app: covid-dashboard

    spec:

      containers:
      - name: covid-dashboard

        image: covid-dashboard

        # imagePullPolicy: Never
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8501

---

apiVersion: v1

kind: Service

metadata:
  name: covid-dashboard-service

spec:

  selector:
    app: covid-dashboard

  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501

  type: LoadBalancer